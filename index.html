<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora MeLi Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0e1117;--surface2:#141720;--border:#1e2230;--border2:#252a3a;
  --text:#e8eaf0;--text2:#8b90a0;--text3:#4a4f60;
  --accent:#FFE11A;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--cyan:#06b6d4;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sidebar-logo .badge{background:var(--accent);color:#000;font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:1.5px}
.sidebar-logo h1{font-size:15px;font-weight:700;margin-top:6px}
.sidebar-logo .sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--surface2)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.user-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-name{font-size:12px;color:var(--text2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.logout-btn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:inherit;padding:3px 6px;border-radius:4px;flex-shrink:0}
.logout-btn:hover{color:var(--red)}
.main{margin-left:220px;padding:32px;min-height:100vh}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:16px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.blue::before{background:var(--blue)}.metric.green::before{background:var(--green)}
.metric.red::before{background:var(--red)}.metric.purple::before{background:var(--purple)}
.metric.orange::before{background:var(--orange)}.metric.cyan::before{background:var(--cyan)}
.metric.yellow::before{background:var(--accent)}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px}
.metric-value{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px}
.period-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.period-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.period-btn:hover{border-color:var(--border2);color:var(--text)}
.period-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.date-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;color-scheme:dark}
.date-input:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.config-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:20px;flex-wrap:wrap}
.config-field{display:flex;align-items:center;gap:8px}
.config-field label{font-size:11px;color:var(--text2);white-space:nowrap;font-weight:500}
.config-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;font-weight:600;width:72px;outline:none;text-align:right}
.config-input:focus{border-color:var(--accent)}
.config-suffix{font-size:12px;color:var(--text3)}
.publi-badge{display:flex;align-items:center;gap:6px;background:#8b5cf618;border:1px solid #8b5cf640;border-radius:8px;padding:6px 12px;font-size:12px;color:var(--purple)}
.publi-badge.ok{background:#22c55e18;border-color:#22c55e40;color:var(--green)}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.chart-wrap{position:relative;height:220px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.table-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
th.r{text-align:right}
td{padding:11px 16px;font-size:12px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
td.text{font-family:'Inter',sans-serif}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.pos{color:var(--green)}.neg{color:var(--red)}.neutral{color:var(--text2)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tag.paid{background:#22c55e18;color:var(--green)}.tag.pending{background:#f9731618;color:var(--orange)}.tag.cancelled{background:#ef444418;color:var(--red)}
.pagination{display:flex;align-items:center;gap:12px;padding:14px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
.rank-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{width:24px;height:24px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0}
.rank-num.top{background:var(--accent);color:#000}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-units{font-size:11px;color:var(--text3);margin-top:2px}
.rank-bar-wrap{width:80px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.rank-bar{height:4px;border-radius:2px}
.rank-value{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;min-width:90px;text-align:right}
/* Cost input */
.cost-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:110px;outline:none;text-align:right}
.cost-input:focus{border-color:var(--accent)}
.cost-input::placeholder{color:var(--text3)}
.cost-saved{color:var(--green);font-size:10px;margin-left:6px;opacity:0;transition:opacity .3s}
.cost-saved.show{opacity:1}
/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;text-align:center;max-width:420px;width:100%}
.auth-card h2{font-size:22px;font-weight:700;margin-bottom:10px}
.auth-card p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:32px}
.btn-meli{background:var(--accent);color:#000;border:none;border-radius:12px;padding:16px 36px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:10px}
.btn-meli:hover{opacity:.85}
.auth-features{display:flex;flex-direction:column;gap:10px;margin-top:28px;text-align:left}
.auth-feature{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.auth-feature svg{color:var(--green);flex-shrink:0}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:12px;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px}
.error-box{background:#ef444412;border:1px solid #ef444430;border-radius:10px;padding:14px 18px;color:var(--red);font-size:13px;margin-bottom:16px}
.info-box{background:#3b82f612;border:1px solid #3b82f630;border-radius:10px;padding:14px 18px;color:var(--blue);font-size:13px;margin-bottom:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:20px}.metrics-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const CLIENT_ID = "820259386035678";
const REDIRECT_URI = window.location.origin + "/callback";

// Carga costos guardados: {item_id: costo}
function loadCosts() { try { return JSON.parse(localStorage.getItem("product_costs") || "{}"); } catch(e){ return {}; } }
function saveCosts(c) { localStorage.setItem("product_costs", JSON.stringify(c)); }

const S = {
  token: localStorage.getItem("meli_token"),
  userId: localStorage.getItem("meli_user_id"),
  nickname: localStorage.getItem("meli_nickname"),
  percepcionesPct: parseFloat(localStorage.getItem("percPct") || "7.01"),
  iibbPct: parseFloat(localStorage.getItem("iibbPct") || "4"),
  publiARS: 0,       // se carga desde MeLi API
  publiManual: parseFloat(localStorage.getItem("publiManual") || "0"),
  publiFromAPI: false,
  orders: [],
  total: 0,
  offset: 0,
  loading: false,
  error: null,
  page: "dashboard",
  period: "month",
  dateFrom: firstOfMonth(),
  dateTo: today(),
  chartInstance: null,
  rankChartInstance: null,
  productCosts: loadCosts(),
};

const PAGE_SIZE = 50;

function fmt(n){
  if(isNaN(n)||n===null) return "—";
  return new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
}
function fmtPct(n){
  if(isNaN(n)||!isFinite(n)) return "—";
  return (n*100).toFixed(1)+"%";
}
function today(){ return new Date().toISOString().split("T")[0]; }
function firstOfMonth(){ const d=new Date(); d.setDate(1); return d.toISOString().split("T")[0]; }
function firstOfLastMonth(){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); return d.toISOString().split("T")[0]; }
function lastOfLastMonth(){ const d=new Date(); d.setDate(0); return d.toISOString().split("T")[0]; }
function startOfWeek(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split("T")[0]; }
function yesterday(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split("T")[0]; }

function getProductCost(itemId, title) {
  if (itemId && S.productCosts[itemId] !== undefined) return S.productCosts[itemId];
  if (title && S.productCosts["t_"+title] !== undefined) return S.productCosts["t_"+title];
  return 0;
}

function calcOrder(o) {
  const precio = o.total_amount || 0;
  const comision = o.commission || 0;
  const envio = o.shipping_cost || 0;
  const iibb = precio * (S.iibbPct / 100);
  const percepciones = precio * (S.percepcionesPct / 100);
  const publiTotal = S.publiFromAPI ? S.publiARS : S.publiManual;
  const totalOrds = S.orders.length || 1;
  const publiProrr = publiTotal / totalOrds;

  // Costo del producto
  const item = o.items?.[0];
  const costoProducto = item ? getProductCost(item.item_id, item.title) * (item.quantity || 1) : 0;

  const costos = comision + envio + iibb + percepciones + publiProrr + costoProducto;
  const ganancia = precio - costos;
  const margen = precio > 0 ? ganancia / precio : 0;
  return { precio, comision, envio, iibb, percepciones, publiProrr, costoProducto, costos, ganancia, margen };
}

async function apiFn(name, params) {
  const qs = new URLSearchParams(params).toString();
  const r = await fetch(`/.netlify/functions/${name}?${qs}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  if (!code) return false;
  window.history.replaceState({}, "", "/");
  try {
    const res = await apiFn("auth", { code });
    if (res.access_token) {
      S.token = res.access_token;
      S.userId = String(res.user_id);
      localStorage.setItem("meli_token", S.token);
      localStorage.setItem("meli_user_id", S.userId);
      const user = await apiFn("user", { token: S.token, user_id: S.userId });
      S.nickname = user.nickname || "Usuario";
      localStorage.setItem("meli_nickname", S.nickname);
      return true;
    }
  } catch(e){ console.error(e); }
  return false;
}

function doLogin() {
  window.location.href = `https://auth.mercadolibre.com.ar/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
}
function doLogout() {
  localStorage.clear();
  Object.assign(S, {token:null,userId:null,nickname:null,orders:[],total:0,publiARS:0,publiFromAPI:false});
  render();
}

async function loadAdvertising() {
  try {
    const data = await apiFn("advertising", { token: S.token, user_id: S.userId, from: S.dateFrom, to: S.dateTo });
    if (data.available && data.total_spent > 0) {
      S.publiARS = data.total_spent;
      S.publiFromAPI = true;
    } else {
      S.publiFromAPI = false;
    }
  } catch(e) {
    S.publiFromAPI = false;
  }
}

async function loadOrders(reset = true) {
  if (reset) { S.offset = 0; S.orders = []; }
  S.loading = true; S.error = null;
  renderContent();
  try {
    const [data] = await Promise.all([
      apiFn("orders", { token: S.token, user_id: S.userId, from: S.dateFrom, to: S.dateTo, offset: S.offset }),
      reset ? loadAdvertising() : Promise.resolve(),
    ]);
    S.orders = reset ? (data.results || []) : [...S.orders, ...(data.results || [])];
    S.total = data.paging?.total || S.orders.length;
  } catch(e) {
    S.error = "Error al cargar ventas: " + e.message;
  }
  S.loading = false;
  renderContent();
}

function setPeriod(p) {
  S.period = p;
  if (p==="today"){ S.dateFrom=today(); S.dateTo=today(); }
  else if(p==="yesterday"){ S.dateFrom=yesterday(); S.dateTo=yesterday(); }
  else if(p==="week"){ S.dateFrom=startOfWeek(); S.dateTo=today(); }
  else if(p==="month"){ S.dateFrom=firstOfMonth(); S.dateTo=today(); }
  else if(p==="lastmonth"){ S.dateFrom=firstOfLastMonth(); S.dateTo=lastOfLastMonth(); }
  document.querySelectorAll(".period-btn").forEach(b=>b.classList.toggle("active",b.dataset.p===p));
  if(p!=="custom") loadOrders();
}

function getStats() {
  const calcs = S.orders.map(o => ({ ...o, ...calcOrder(o) }));
  const totalVentas = calcs.reduce((s,o)=>s+o.precio,0);
  const totalGanancia = calcs.reduce((s,o)=>s+o.ganancia,0);
  const totalComisiones = calcs.reduce((s,o)=>s+o.comision,0);
  const totalEnvios = calcs.reduce((s,o)=>s+o.envio,0);
  const totalIIBB = calcs.reduce((s,o)=>s+o.iibb,0);
  const totalPercepciones = calcs.reduce((s,o)=>s+o.percepciones,0);
  const totalCostoProducto = calcs.reduce((s,o)=>s+o.costoProducto,0);
  const totalCostos = calcs.reduce((s,o)=>s+o.costos,0);
  const publiTotal = S.publiFromAPI ? S.publiARS : S.publiManual;
  const margen = totalVentas>0 ? totalGanancia/totalVentas : 0;
  const tacos = totalVentas>0 && publiTotal>0 ? publiTotal/totalVentas : 0;
  const roas = publiTotal>0 ? totalVentas/publiTotal : null;
  const trueRoas = publiTotal>0 ? totalGanancia/publiTotal : null;
  return { calcs, totalVentas, totalGanancia, totalComisiones, totalEnvios, totalIIBB, totalPercepciones, totalCostoProducto, totalCostos, margen, tacos, roas, trueRoas, publiTotal, count: calcs.length };
}

function getByProduct(calcs) {
  const map = {};
  calcs.forEach(o => {
    (o.items||[]).forEach(item => {
      const key = item.item_id || item.title;
      if (!map[key]) map[key] = { title: item.title, item_id: item.item_id, qty: 0, ventas: 0, ganancia: 0, costoProducto: 0 };
      const frac = o.precio > 0 ? (item.unit_price * (item.quantity||1)) / o.precio : 1;
      map[key].qty += item.quantity || 1;
      map[key].ventas += o.precio * frac;
      map[key].ganancia += o.ganancia * frac;
      map[key].costoProducto += getProductCost(item.item_id, item.title);
    });
  });
  return Object.values(map).sort((a,b)=>b.ganancia-a.ganancia);
}

function getByDay(calcs) {
  const map = {};
  calcs.forEach(o => {
    const day = (o.date||"").split("T")[0];
    if(!map[day]) map[day]={ventas:0,ganancia:0};
    map[day].ventas += o.precio;
    map[day].ganancia += o.ganancia;
  });
  const keys = Object.keys(map).sort();
  return { labels: keys.map(k=>k.slice(5)), ventas: keys.map(k=>map[k].ventas), ganancia: keys.map(k=>map[k].ganancia) };
}

function renderCharts(stats) {
  const byDay = getByDay(stats.calcs);
  const byProduct = getByProduct(stats.calcs).slice(0,6);
  if(S.chartInstance){S.chartInstance.destroy();S.chartInstance=null;}
  if(S.rankChartInstance){S.rankChartInstance.destroy();S.rankChartInstance=null;}
  const ctx1 = document.getElementById("chartVentas");
  if(ctx1 && byDay.labels.length>0){
    S.chartInstance = new Chart(ctx1,{
      type:"bar",
      data:{labels:byDay.labels,datasets:[
        {label:"Ventas",data:byDay.ventas,backgroundColor:"#3b82f620",borderColor:"#3b82f6",borderWidth:1.5,borderRadius:4},
        {label:"Ganancia",data:byDay.ganancia,backgroundColor:"#22c55e20",borderColor:"#22c55e",borderWidth:1.5,borderRadius:4,type:"line",fill:true},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8b90a0",font:{size:11}}}},scales:{x:{ticks:{color:"#4a4f60",font:{size:10}},grid:{color:"#1e2230"}},y:{ticks:{color:"#4a4f60",font:{size:10},callback:v=>"$"+(v>=1000?(v/1000).toFixed(0)+"k":v)},grid:{color:"#1e2230"}}}}
    });
  }
  const ctx2 = document.getElementById("chartProducts");
  if(ctx2 && byProduct.length>0){
    S.rankChartInstance = new Chart(ctx2,{
      type:"doughnut",
      data:{labels:byProduct.map(p=>p.title.slice(0,20)+(p.title.length>20?"…":"")),datasets:[{data:byProduct.map(p=>Math.max(0,p.ganancia)),backgroundColor:["#22c55e","#3b82f6","#8b5cf6","#f97316","#06b6d4","#FFE11A"],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#8b90a0",font:{size:10},padding:10,boxWidth:10}}}}
    });
  }
}

function periodBar() {
  const ps = [{k:"today",l:"Hoy"},{k:"yesterday",l:"Ayer"},{k:"week",l:"Semana"},{k:"month",l:"Este mes"},{k:"lastmonth",l:"Mes anterior"},{k:"custom",l:"Custom"}];
  return `<div class="period-bar">
    ${ps.map(p=>`<button class="period-btn${S.period===p.k?" active":""}" data-p="${p.k}" onclick="setPeriod('${p.k}')">${p.l}</button>`).join("")}
    <input type="date" class="date-input" value="${S.dateFrom}" onchange="S.dateFrom=this.value;S.period='custom';document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.p==='custom'))">
    <input type="date" class="date-input" value="${S.dateTo}" onchange="S.dateTo=this.value;S.period='custom';document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.p==='custom'))">
    <button class="btn-primary" onclick="loadOrders()" ${S.loading?"disabled":""}>Cargar</button>
    <button class="btn-ghost" onclick="exportCSV()">↓ CSV</button>
  </div>`;
}

function configBar() {
  const publiTotal = S.publiFromAPI ? S.publiARS : S.publiManual;
  return `<div class="config-row">
    <span style="font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px">⚙ Config</span>
    <div class="config-field"><label>Percepciones</label><input class="config-input" type="number" value="${S.percepcionesPct}" step="0.1" onchange="S.percepcionesPct=parseFloat(this.value)||7.01;localStorage.setItem('percPct',S.percepcionesPct);if(S.orders.length)renderContent()"><span class="config-suffix">%</span></div>
    <div class="config-field"><label>IIBB ret.</label><input class="config-input" type="number" value="${S.iibbPct}" step="0.1" onchange="S.iibbPct=parseFloat(this.value)||4;localStorage.setItem('iibbPct',S.iibbPct);if(S.orders.length)renderContent()"><span class="config-suffix">%</span></div>
    ${S.publiFromAPI
      ? `<div class="publi-badge ok">✓ Publicidad desde MeLi: ${fmt(S.publiARS)}</div>`
      : `<div class="config-field"><label>Publicidad manual</label><input class="config-input" style="color:var(--purple);width:90px" type="number" value="${S.publiManual}" step="100" onchange="S.publiManual=parseFloat(this.value)||0;localStorage.setItem('publiManual',S.publiManual);if(S.orders.length)renderContent()"><span class="config-suffix">$</span></div>
         <span style="font-size:11px;color:var(--text3)">· activá "Publicidad" en MeLi developers para traerlo automático</span>`}
  </div>`;
}

function renderAuth() {
  document.getElementById("root").innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div style="margin-bottom:20px"><span style="background:var(--accent);color:#000;font-size:12px;font-weight:800;padding:4px 12px;border-radius:4px;letter-spacing:1px">MELI PRO</span></div>
        <h2>Calculadora de Ganancias</h2>
        <p>Conectá tu cuenta para ver ventas reales, comisiones, envíos y ganancias automáticamente.</p>
        <button class="btn-meli" onclick="doLogin()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#000" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>
          Conectar con Mercado Libre
        </button>
        <div class="auth-features">
          ${["Comisiones reales de MeLi por orden","Costos de envío reales","IIBB y percepciones estimadas","Costo de producto por ítem","Publicidad automática (si está habilitada)","Ranking de productos más rentables"].map(f=>`
          <div class="auth-feature"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>${f}</div>`).join("")}
        </div>
      </div>
    </div>`;
}

function renderShell() {
  document.getElementById("root").innerHTML = `
    <div class="sidebar">
      <div class="sidebar-logo">
        <span class="badge">MELI</span>
        <h1>Calculadora Pro</h1>
        <div class="sub">Panel de ganancias</div>
      </div>
      <div class="nav-item active" data-page="dashboard" onclick="setPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="orders" onclick="setPage('orders')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Órdenes
      </div>
      <div class="nav-item" data-page="products" onclick="setPage('products')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Productos y Costos
      </div>
      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="user-dot"></div>
          <div class="user-name">${S.nickname||"Usuario"}</div>
          <button class="logout-btn" onclick="doLogout()">Salir</button>
        </div>
      </div>
    </div>
    <div class="main" id="main-content"></div>`;
}

function setPage(p) {
  S.page = p;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.page===p));
  renderContent();
}

function renderContent() {
  const el = document.getElementById("main-content");
  if(!el) return;
  if(S.page==="dashboard") renderDashboard(el);
  else if(S.page==="orders") renderOrders(el);
  else if(S.page==="products") renderProducts(el);
}

function renderDashboard(el) {
  if(S.loading){ el.innerHTML=`<div class="loading-wrap"><div class="spinner"></div>Cargando ventas...</div>`; return; }
  const stats = S.orders.length ? getStats() : null;
  const byProduct = stats ? getByProduct(stats.calcs) : [];
  const maxGanancia = byProduct.length ? Math.max(...byProduct.map(p=>p.ganancia)) : 1;

  el.innerHTML = `
    <div class="page-header"><div><div class="page-title">Dashboard</div><div class="page-sub">Resumen de ganancias y métricas clave</div></div></div>
    ${configBar()}${periodBar()}
    ${S.error?`<div class="error-box">${S.error}</div>`:""}
    ${!stats?`<div class="empty">Seleccioná un período y cargá las ventas.</div>`:`
    <div class="metrics-grid">
      <div class="metric blue"><div class="metric-label">Ventas brutas</div><div class="metric-value" style="color:var(--blue)">${fmt(stats.totalVentas)}</div><div class="metric-sub">${stats.count} órdenes · ${S.total} total</div></div>
      <div class="metric green"><div class="metric-label">Ganancia neta</div><div class="metric-value" style="color:var(--green)">${fmt(stats.totalGanancia)}</div><div class="metric-sub">Margen: ${fmtPct(stats.margen)}</div></div>
      <div class="metric red"><div class="metric-label">Total costos</div><div class="metric-value" style="color:var(--red)">${fmt(stats.totalCostos)}</div><div class="metric-sub">Todos los descuentos</div></div>
      <div class="metric yellow"><div class="metric-label">Comisiones MeLi</div><div class="metric-value" style="color:var(--accent)">${fmt(stats.totalComisiones)}</div><div class="metric-sub">${fmtPct(stats.totalVentas>0?stats.totalComisiones/stats.totalVentas:0)} sobre ventas</div></div>
    </div>
    <div class="metrics-grid">
      <div class="metric cyan"><div class="metric-label">Envíos reales</div><div class="metric-value" style="color:var(--cyan)">${fmt(stats.totalEnvios)}</div></div>
      <div class="metric orange"><div class="metric-label">IIBB + Percepciones</div><div class="metric-value" style="color:var(--orange)">${fmt(stats.totalIIBB+stats.totalPercepciones)}</div><div class="metric-sub">${S.iibbPct}% + ${S.percepcionesPct}%</div></div>
      <div class="metric purple"><div class="metric-label">Costo productos</div><div class="metric-value" style="color:var(--purple)">${fmt(stats.totalCostoProducto)}</div><div class="metric-sub">${stats.totalCostoProducto===0?"Cargá costos en Productos":""}</div></div>
      ${stats.publiTotal>0
        ?`<div class="metric purple"><div class="metric-label">TACOS</div><div class="metric-value" style="color:var(--purple)">${fmtPct(stats.tacos)}</div><div class="metric-sub">True ROAS: ${stats.trueRoas?stats.trueRoas.toFixed(2)+"x":"—"}</div></div>`
        :`<div class="metric" style="border:1px dashed var(--border)"><div class="metric-label">Publicidad</div><div class="metric-value" style="color:var(--text3);font-size:14px">Sin datos</div><div class="metric-sub">Activá el permiso en MeLi</div></div>`}
    </div>
    <div class="charts-grid">
      <div class="card"><div class="card-title">Ventas vs Ganancia por día</div><div class="chart-wrap"><canvas id="chartVentas"></canvas></div></div>
      <div class="card"><div class="card-title">Ganancia por producto</div><div class="chart-wrap"><canvas id="chartProducts"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-title">Ranking de productos más rentables</div>
      ${byProduct.slice(0,8).map((p,i)=>`
        <div class="rank-item">
          <div class="rank-num ${i===0?"top":""}">${i+1}</div>
          <div class="rank-info"><div class="rank-name">${p.title}</div><div class="rank-units">${p.qty} uds · ${fmt(p.ventas)} ventas</div></div>
          <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.max(4,p.ganancia/maxGanancia*100)}%;background:${p.ganancia>=0?"var(--green)":"var(--red)"}"></div></div>
          <div class="rank-value ${p.ganancia>=0?"pos":"neg"}">${fmt(p.ganancia)}</div>
        </div>`).join("")}
    </div>`}`;
  if(stats) setTimeout(()=>renderCharts(stats),50);
}

function renderOrders(el) {
  if(S.loading){ el.innerHTML=`<div class="loading-wrap"><div class="spinner"></div>Cargando órdenes...</div>`; return; }
  const stats = S.orders.length ? getStats() : null;
  el.innerHTML = `
    <div class="page-header"><div><div class="page-title">Órdenes</div><div class="page-sub">Detalle completo por venta con costos reales</div></div></div>
    ${configBar()}${periodBar()}
    ${S.error?`<div class="error-box">${S.error}</div>`:""}
    ${!stats?`<div class="empty">Seleccioná un período y cargá las ventas.</div>`:`
    <div class="table-wrap">
      <div class="table-header"><span class="table-title">▸ ${stats.count} órdenes · ${S.total} total</span></div>
      <table>
        <thead><tr>
          <th>Producto</th><th>Fecha</th><th class="r">Precio</th><th class="r">Costo prod.</th><th class="r">Comisión</th><th class="r">Envío</th><th class="r">IIBB</th><th class="r">Percep.</th><th class="r">Ganancia</th><th class="r">Margen</th><th>Estado</th>
        </tr></thead>
        <tbody>
          ${stats.calcs.map(o=>{
            const title=o.items?.[0]?.title||"—";
            const fecha=(o.date||"").split("T")[0];
            const sc=o.status==="paid"?"paid":o.status==="cancelled"?"cancelled":"pending";
            const sl=o.status==="paid"?"Pagada":o.status==="cancelled"?"Cancelada":"Pendiente";
            return `<tr>
              <td class="text" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${title}">${title}</td>
              <td class="neutral">${fecha}</td>
              <td class="r">${fmt(o.precio)}</td>
              <td class="r ${o.costoProducto>0?"neg":"neutral"}">${o.costoProducto>0?fmt(-o.costoProducto):"—"}</td>
              <td class="r neg">${fmt(-o.comision)}</td>
              <td class="r neg">${fmt(-o.envio)}</td>
              <td class="r neg">${fmt(-o.iibb)}</td>
              <td class="r neg">${fmt(-o.percepciones)}</td>
              <td class="r ${o.ganancia>=0?"pos":"neg"}">${fmt(o.ganancia)}</td>
              <td class="r ${o.margen>=0?"pos":"neg"}">${fmtPct(o.margen)}</td>
              <td><span class="tag ${sc}">${sl}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
      <div class="pagination">
        <button class="btn-ghost" onclick="prevPage()" ${S.offset===0?"disabled":""}>← Anterior</button>
        <span>Página ${Math.floor(S.offset/PAGE_SIZE)+1} · ${stats.count} de ${S.total} ventas</span>
        <button class="btn-ghost" style="margin-left:auto" onclick="nextPage()" ${S.offset+PAGE_SIZE>=S.total?"disabled":""}>Siguiente →</button>
      </div>
    </div>`}`;
}

function renderProducts(el) {
  if(S.loading){ el.innerHTML=`<div class="loading-wrap"><div class="spinner"></div>Cargando...</div>`; return; }
  const stats = S.orders.length ? getStats() : null;
  const byProduct = stats ? getByProduct(stats.calcs) : [];

  el.innerHTML = `
    <div class="page-header"><div><div class="page-title">Productos y Costos</div><div class="page-sub">Cargá el costo de cada producto para ver la ganancia real</div></div></div>
    ${configBar()}${periodBar()}
    ${S.error?`<div class="error-box">${S.error}</div>`:""}
    ${!byProduct.length
      ?`<div class="empty">Cargá las ventas para ver los productos.</div>`
      :`<div class="info-box">💡 Ingresá el costo unitario de cada producto. Se guarda automáticamente y se aplica a todas las órdenes.</div>
      <div class="table-wrap">
        <div class="table-header"><span class="table-title">▸ ${byProduct.length} productos distintos</span></div>
        <table>
          <thead><tr>
            <th>#</th><th>Producto</th><th class="r">Unidades</th><th class="r">Costo unitario</th><th class="r">Ventas brutas</th><th class="r">Costo total prod.</th><th class="r">Ganancia</th><th class="r">Margen</th>
          </tr></thead>
          <tbody>
            ${byProduct.map((p,i)=>{
              const costKey = p.item_id || "t_"+p.title;
              const savedCost = S.productCosts[p.item_id] ?? S.productCosts["t_"+p.title] ?? "";
              const margen = p.ventas>0?p.ganancia/p.ventas:0;
              return `<tr>
                <td style="color:var(--text3)">${i+1}</td>
                <td class="text" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.title}">${p.title}</td>
                <td class="r">${p.qty}</td>
                <td class="r">
                  <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
                    <span>$</span>
                    <input class="cost-input" type="number" placeholder="0" value="${savedCost}"
                      data-item-id="${p.item_id||""}" data-title="${p.title}"
                      onchange="saveCostInput(this)" min="0" step="1">
                    <span class="cost-saved" id="saved-${i}">✓</span>
                  </div>
                </td>
                <td class="r">${fmt(p.ventas)}</td>
                <td class="r ${p.costoProducto>0?"neg":"neutral"}">${p.costoProducto>0?fmt(-p.costoProducto):"—"}</td>
                <td class="r ${p.ganancia>=0?"pos":"neg"}">${fmt(p.ganancia)}</td>
                <td class="r ${margen>=0?"pos":"neg"}">${fmtPct(margen)}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`}`;
}

function saveCostInput(input) {
  const itemId = input.dataset.itemId;
  const title = input.dataset.title;
  const val = parseFloat(input.value) || 0;
  if (itemId) S.productCosts[itemId] = val;
  else S.productCosts["t_"+title] = val;
  saveCosts(S.productCosts);
  // Show saved indicator
  const idx = Array.from(document.querySelectorAll(".cost-input")).indexOf(input);
  const savedEl = document.querySelectorAll(".cost-saved")[idx];
  if(savedEl){ savedEl.classList.add("show"); setTimeout(()=>savedEl.classList.remove("show"),1500); }
  // Recalc without re-rendering the whole page
  if(S.orders.length) {
    // Update just the ganancia/margen cells without full re-render
    renderContent();
  }
}

function prevPage(){ if(S.offset>0){ S.offset=Math.max(0,S.offset-PAGE_SIZE); loadOrders(false); } }
function nextPage(){ S.offset+=PAGE_SIZE; loadOrders(false); }

function exportCSV() {
  if(!S.orders.length) return;
  const stats = getStats();
  const rows=[["Producto","Fecha","Precio","Costo Producto","Comision MeLi","Envio","IIBB","Percepciones","Publicidad","Ganancia","Margen %","Estado"]];
  stats.calcs.forEach(o=>{
    rows.push([
      o.items?.[0]?.title||"",
      (o.date||"").split("T")[0],
      o.precio, o.costoProducto.toFixed(2), o.comision.toFixed(2), o.envio.toFixed(2),
      o.iibb.toFixed(2), o.percepciones.toFixed(2), o.publiProrr.toFixed(2),
      o.ganancia.toFixed(2), (o.margen*100).toFixed(1)+"%", o.status
    ]);
  });
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8,﻿"+encodeURIComponent(csv);
  a.download = `ventas-meli-${S.dateFrom}-${S.dateTo}.csv`;
  a.click();
}

async function render() {
  await handleCallback();
  if(S.token){ renderShell(); renderContent(); loadOrders(); }
  else{ renderAuth(); }
}
render();
</script>
</body>
</html>
